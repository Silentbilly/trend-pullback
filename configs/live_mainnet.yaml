# ============================================================
# Trend Pullback Pro — Base Configuration
# All parameters mirror the Pine Script inputs exactly.
# Override any value in a derived config (e.g. sample_backtest.yaml).
# ============================================================

strategy:
  # --- Trend EMAs ---
  fast_len: 34          # Fast EMA period
  slow_len: 200         # Slow EMA period
  pull_len: 13          # Pullback EMA period

  # --- Slope filter ---
  use_slope: true       # Require both EMAs to slope in trend direction
  slope_lb: 5           # Bars lookback for slope check

  # --- Pullback window ---
  min_pb: 1             # Minimum consecutive pullback bars required
  max_pb: 2             # Maximum consecutive pullback bars allowed

  # --- RSI filter ---
  use_rsi: true         # Enable RSI filter
  rsi_len: 14           # RSI period
  rsi_long_min: 45      # RSI must be >= this for long signal
  rsi_short_max: 55     # RSI must be <= this for short signal

  # --- Anti-duplicate ---
  block_repeats: true   # Allow only one signal per pullback cycle

  # --- Risk ---
  atr_len: 14           # ATR period
  atr_mul: 2.4          # Stop distance = ATR * atr_mul
  rr: 2.3               # Risk-reward ratio for take-profit

live:
  testnet: true

backtest:
  symbol: "ETHUSDT"
  timeframe: "15m"
  data_path: "data/raw/ETHUSDT_15m.csv"   # not used in live mode
  initial_capital: 100.0
  commission_pct: 0.06
  stake: 0.01
  leverage: 10

