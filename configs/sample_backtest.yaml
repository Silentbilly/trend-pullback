# ============================================================
# Trend Pullback Pro — Sample Backtest Config
# Inherits defaults from base.yaml, overrides selected params.
# Usage: python scripts/run_backtest.py --config configs/sample_backtest.yaml
# ============================================================

strategy:
  fast_len: 50
  slow_len: 200
  pull_len: 21
  use_slope: true
  slope_lb: 5
  min_pb: 1
  max_pb: 8
  use_rsi: false        # RSI filter disabled — useful for initial exploration
  rsi_len: 14
  rsi_long_min: 45
  rsi_short_max: 55
  block_repeats: true
  atr_len: 14
  atr_mul: 1.5
  rr: 2.0

backtest:
  symbol: "BTCUSDT"
  timeframe: "1h"
  data_path: "data/raw/BTCUSDT_1h.csv"
  initial_capital: 10000.0
  commission_pct: 0.06
  stake: 1
